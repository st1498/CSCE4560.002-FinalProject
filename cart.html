<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - CyberMax Security</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #F6F6F6; color: #333333; }
        header { background: #333333; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; color: #990100; text-decoration: none; }
        
        nav a, nav a:visited { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
        nav a:hover { color: #990100; }
        
        .breadcrumb { padding: 10px 5%; background: #E8E8E8; font-size: 12px; border-bottom: 1px solid #ccc; }
        
        .container { background: white; margin: 40px auto; padding: 40px; max-width: 900px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: #990100; margin-top: 0; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #E8E8E8; color: #990100; }
        td { padding: 20px; background: #F9F9F9; }
        td:first-child { border-radius: 20px 0 0 20px; }
        td:last-child { border-radius: 0 20px 20px 0; }
        
        
        .button-row {
            display: flex;
            justify-content: flex-end; 
            margin-top: 30px;
        }

        .btn { 
            background: #990100; 
            color: white; 
            padding: 18px 40px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 16px; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s; 
            display: inline-block;
            text-align: center;
        }

        .btn:hover { 
            background: #B90504; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(153, 1, 0, 0.3);
        }
    </style>
</head>
<body>
    <header>
        <a href="homepage.html" class="logo">CyberMax Security</a>
        <nav>
            <span id="display-user">User</span> | 
            <a href="homepage.html">Home</a> | 
            <a href="#" onclick="handleLogout()">Logout</a>
        </nav>
    </header>
    <div class="breadcrumb">Home > <strong>Shopping Cart</strong></div>
    
    <div class="container">
        <h2>Your Shopping Cart</h2>
        <table>
            <thead>
                <tr>
                    <th>Product ID</th>
                    <th>Item Information</th>
                    <th>Total Price</th>
                </tr>
            </thead>
            <tbody id="cart-display"></tbody>
        </table>

        <div class="button-row">
            <a href="checkout.html" class="btn">Proceed to Checkout</a>
        </div>
    </div>

    <script>

        const user = localStorage.getItem('username');
        if (user && document.getElementById('display-user')) {
            document.getElementById('display-user').innerText = user;
        }

        
        function handleLogout() {
            localStorage.clear(); 
            alert("Security session ended. You have been safely logged out.");
            window.location.href = 'signin.html';
        }

        
        const productName = localStorage.getItem('cartItemName');
        const productPrice = localStorage.getItem('cartItemPrice');
        const displayArea = document.getElementById('cart-display');

        if (productName && productPrice) {
            displayArea.innerHTML = `
                <tr>
                    <td>#SEC-${Math.floor(Math.random() * 1000)}</td>
                    <td>CyberMax ${productName}</td>
                    <td>${productPrice}</td>
                </tr>
            `;
        } else {
            displayArea.innerHTML = `
                <tr>
                    <td colspan="3" style="text-align: center; padding: 40px;">
                        Your cart is empty. <a href="homepage.html" style="color: #990100; font-weight: bold; text-decoration: none;">Go back to shop.</a>
                    </td>
                </tr>
            `;
        }
    </script>
</body>
</html>
