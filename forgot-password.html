<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - CyberMax Security</title>
    <style>
        body { font-family: Arial, sans-serif; background: #F6F6F6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 50px; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: #990100; text-decoration: none; display: block; margin-bottom: 20px; }
        h2 { color: #333; font-size: 20px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #E8E8E8; border-radius: 10px; box-sizing: border-box; background: #F9F9F9; }
        .btn { width: 100%; padding: 14px; background: #990100; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn:hover { background: #B90504; }
        .back-link { display: block; margin-top: 20px; color: #990100; text-decoration: none; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <a href="index.html" class="logo">CyberMax Security</a>
        <h2>Reset Your Password</h2>
        <p>Enter your registered email address below. We will send you a secure link to reset your credentials.</p>
        
        <input type="email" id="reset-email" placeholder="Email Address">
        
        <button class="btn" onclick="handleReset()">Send Reset Link</button>
        
        <a href="signin.html" class="back-link">← Back to Sign In</a>
    </div>

    <script>
        function handleReset() {
            const email = document.getElementById('reset-email').value;
            if (email === "") {
                alert("Please enter your email address.");
                return;
            }
            alert("Security protocol initiated. If an account exists for " + email + ", a reset link will be sent shortly.");
            window.location.href = 'signin.html';
        }
    </script>
</body>
</html>
