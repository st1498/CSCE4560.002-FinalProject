<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile - CyberMax Security</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #F6F6F6; color: #333333; }
        header { background: #333333; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; color: #990100; text-decoration: none; }
        nav a, nav a:visited { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
        nav a:hover { color: #990100; }
        .breadcrumb { padding: 10px 5%; background: #E8E8E8; font-size: 12px; border-bottom: 1px solid #ccc; }
        
        .container { 
            background: white; 
            margin: 40px auto; 
            padding: 40px; 
            max-width: 900px; 
            border-radius: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        .profile-section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .profile-section p { font-size: 16px; margin: 10px 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: #F9F9F9; color: #990100; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .btn { background: #990100; color: white; padding: 12px 20px; border-radius: 10px; text-decoration: none; display: inline-block; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; }
        .btn:hover { background: #B90504; }
        code { background: #eee; padding: 4px 8px; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">CyberMax Security</a>
        <nav><strong id="nav-user">User</strong> | <a href="index.html">Home</a> | <a href="#" onclick="handleLogout()">Logout</a></nav>
    </header>
    <div class="breadcrumb">Home > <strong>User Profile</strong></div>
    
    <div class="container">
        <h2>Account Settings</h2>
        <div class="profile-section">
            <p><strong>Username:</strong> <span id="prof-username">Loading...</span></p>
            <p><strong>Email:</strong> <span id="prof-email">Loading...</span></p>
            <p><strong>Address:</strong> <span id="prof-address">Loading...</span></p>
            <a href="change-password.html" class="btn" style="font-size: 13px; margin-top: 10px;">Change Password</a>
        </div>

        <h2>My Products & License Keys</h2>
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Purchase Date</th>
                    <th>License Key</th>
                </tr>
            </thead>
            <tbody id="purchase-history"></tbody>
        </table>
    </div>

    <script>
        const storedUser = localStorage.getItem('username') || "User";
        const storedEmail = localStorage.getItem('userEmail') || "Not Provided";
        const storedAddress = localStorage.getItem('userAddress') || "Not Provided";

        document.getElementById('nav-user').innerText = storedUser;
        document.getElementById('prof-username').innerText = storedUser;
        document.getElementById('prof-email').innerText = storedEmail;
        document.getElementById('prof-address').innerText = storedAddress;

        const item = localStorage.getItem('purchasedItem');
        const date = localStorage.getItem('purchaseDate');
        const historyTable = document.getElementById('purchase-history');

        if (item) {
            historyTable.innerHTML = `
                <tr>
                    <td>CyberMax ${item}</td>
                    <td>${date}</td>
                    <td><code>CMX-${Math.floor(Math.random() * 9000 + 1000)}-KEY</code></td>
                </tr>
            `;
        } else {
            historyTable.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 30px;">No products purchased yet.</td></tr>`;
        }
        const user = localStorage.getItem('username');
        if (user && document.getElementById('display-user')) {
            document.getElementById('display-user').innerText = user;
        }

        function handleLogout() {
            localStorage.clear(); 
            alert("Security session ended. You have been safely logged out.");
            window.location.href = 'signin.html';
        }
    </script>
</body>
</html>
