<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - CyberMax Security</title>
    <style>
        body { font-family: Arial, sans-serif; background: #F6F6F6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 50px; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: #990100; text-decoration: none; display: block; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #E8E8E8; border-radius: 10px; box-sizing: border-box; background: #F9F9F9; }
        .btn { width: 100%; padding: 14px; background: #990100; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #B90504; }
        .links { margin-top: 15px; font-size: 14px; color: #333333; }
        .links a { color: #990100; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <a href="{{ url_for('index') }}" class="logo">CyberMax Security</a>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-wrapper">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form action="{{ url_for('signin') }}" method="POST">
            <input type="text" id="username-field" name="username-field" placeholder="Username or Email" required>
            <input type="password" id="password-field" name="password-field" placeholder="Password" required>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="links">
            <a href="{{ url_for('forgot_password') }}" style="font-size: 12px; display: block; margin-bottom: 20px;">Forgot Password?</a>
            Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
        </div>
    </div>

    <script>
        function handleLogout() {
            localStorage.clear();
            alert("Security session ended. You have been safely logged out.");
            window.location.href = "{{ url_for('signin') }}";
        }
    </script>
</body>
</html>
