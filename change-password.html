<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password - CyberMax Security</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #F6F6F6; color: #333333; }
        header { background: #333333; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; color: #990100; text-decoration: none; }
        nav a, nav a:visited { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
        nav a:hover { color: #990100; }
        .breadcrumb { padding: 10px 5%; background: #E8E8E8; font-size: 12px; border-bottom: 1px solid #ccc; }
        .container { background: white; margin: 50px auto; padding: 50px; max-width: 500px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: #990100; margin-top: 0; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #E8E8E8; border-radius: 10px; box-sizing: border-box; background: #F9F9F9; }
        .rules { font-size: 12px; color: #666; margin: 5px 0 15px 5px; }
        .btn { background: #990100; color: white; padding: 14px 25px; border-radius: 10px; text-decoration: none; display: inline-block; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; width: 100%; margin-bottom: 15px; }
        .btn:hover { background: #B90504; }
        .cancel-link { display: block; text-align: center; color: #333; text-decoration: none; font-size: 14px; }
        .cancel-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <a href="homepage.html" class="logo">CyberMax Security</a>
        <nav><span id="display-user">User</span> | <a href="homepage.html">Home</a> | <a href="profile.html">Profile</a> | <a href="#" onclick="handleLogout()">Logout</a></nav>
    </header>
    <div class="breadcrumb">Home > Profile > <strong>Change Password</strong></div>
    
    <div class="container">
        <h2>Secure Password Reset</h2>
        <p style="font-size: 14px; color: #333;">Enter your current password to verify your identity.</p>
        
        <input type="password" id="current-pass" placeholder="Current Password">
        <hr style="border: 0; border-top: 1px solid #E8E8E8; margin: 20px 0;">
        
        <input type="password" id="new-pass" placeholder="New Password">
        <p class="rules">Must be 12+ characters with Upper, Lower, Number, and Special characters.</p>
        <input type="password" id="confirm-new-pass" placeholder="Confirm New Password">
        
        <button class="btn" onclick="handlePasswordChange()">Update Password</button>
        <a href="profile.html" class="cancel-link">Cancel and Go Back</a>
    </div>

    <script>
        const user = localStorage.getItem('username');
        if (user) { document.getElementById('display-user').innerText = user; }

        function handlePasswordChange() {
            const currentPass = document.getElementById('current-pass').value;
            const newPass = document.getElementById('new-pass').value;
            const confirmPass = document.getElementById('confirm-new-pass').value;

            // Security Logic
            const hasUpperCase = /[A-Z]/.test(newPass);
            const hasLowerCase = /[a-z]/.test(newPass);
            const hasNumbers = /\d/.test(newPass);
            const hasNonalphas = /\W/.test(newPass);

            if (currentPass === "" || newPass === "" || confirmPass === "") {
                alert("Please fill in all fields.");
                return;
            }

            if (newPass.length < 12) {
                alert("Security Alert: New password must be at least 12 characters long.");
                return;
            }

            if (!(hasUpperCase && hasLowerCase && hasNumbers && hasNonalphas)) {
                alert("Complexity Error: Your new password does not meet security requirements.");
                return;
            }

            if (newPass !== confirmPass) {
                alert("Validation Error: New passwords do not match.");
                return;
            }

            // Success
            alert("Security Protocol Verified: Password Successfully Updated!");
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
